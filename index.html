<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HiRES Energy Monitor | Production</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            overflow: hidden;
            transition: background 0.8s ease;
        }

        /* Upgraded Premium Gradients */
        body.theme-blue { background: radial-gradient(circle at 80% 0%, #1e293b, #020617); }
        body.theme-green { background: radial-gradient(circle at 80% 0%, #14532d, #022c22); }
        body.theme-amber { background: radial-gradient(circle at 80% 0%, #451a03, #2a1205); }

        body.theme-blue #app-container { background-color: transparent; }
        body.theme-green #app-container { background-color: transparent; }
        body.theme-amber #app-container { background-color: transparent; }

        /* Refined Enterprise Glassmorphism */
        .glass {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        
        .glass-card {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.7) 0%, rgba(15, 23, 42, 0.4) 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.25rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.2);
        }

        /* Animations */
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .pulse-dot { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.8); } }

        /* Mac-Style Modal Animations */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 60;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            width: 90%;
            max-width: 400px;
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.95) 0%, rgba(15, 23, 42, 0.95) 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 1.5rem;
            padding: 1.5rem;
            transform: scale(0.85) translateY(30px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); /* Bouncy Mac-like effect */
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .modal-overlay.active .modal-content {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        /* Horizontal Scrollbar Hide */
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { scrollbar-width: none; }

        /* Mobile Layout */
        #app-container {
            max-width: 480px;
            margin: 0 auto;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }
        #content-area {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 90px;
            scrollbar-width: none;
            scroll-behavior: smooth;
        }
        #content-area::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="theme-blue">

    <div id="app-container">
        <header class="glass z-20 px-6 py-4 flex justify-between items-center sticky top-0 border-b border-slate-700/50">
            <div>
                <h1 class="text-xl font-bold tracking-tight text-white flex items-center gap-2">
                    <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center shadow-lg shadow-cyan-500/30">
                        <i class="fa-solid fa-bolt text-white text-sm"></i>
                    </div>
                    HiRES
                </h1>
                <div class="flex items-center gap-1.5 mt-1">
                    <div class="w-2 h-2 rounded-full bg-green-500 pulse-dot" id="live-indicator"></div>
                    <p class="text-[10px] font-medium text-slate-400 uppercase tracking-wider" id="connection-status">System Online</p>
                </div>
            </div>
            <div class="flex items-center gap-3 bg-slate-800/50 py-1.5 px-3 rounded-2xl border border-slate-700/50">
                <div class="text-right">
                    <div id="weather-temp" class="text-sm font-bold text-slate-100">--°C</div>
                    <div id="weather-desc" class="text-[10px] text-slate-400 font-medium">Loading...</div>
                </div>
                <div id="weather-icon" class="text-cyan-400 text-lg">
                    <i class="fa-solid fa-cloud"></i>
                </div>
            </div>
        </header>

        <main id="content-area" class="px-4 py-4 space-y-4">
            </main>

        <nav class="glass absolute bottom-0 w-full pb-safe pt-2 px-6 pb-4 flex justify-between items-center z-30 rounded-t-2xl border-t border-slate-700">
            <button onclick="navigateTo('dashboard')" class="nav-btn active flex flex-col items-center gap-1 text-cyan-400 transition-colors">
                <i class="fa-solid fa-chart-pie text-xl"></i>
                <span class="text-[10px] font-medium">Monitor</span>
            </button>
            <button onclick="navigateTo('analysis')" class="nav-btn flex flex-col items-center gap-1 text-slate-500 hover:text-cyan-400 transition-colors">
                <i class="fa-solid fa-chart-line text-xl"></i>
                <span class="text-[10px] font-medium">Analysis</span>
            </button>
            <div class="relative -top-6">
                <button onclick="toggleActionMenu()" class="w-14 h-14 rounded-full bg-gradient-to-br from-cyan-400 to-blue-600 shadow-lg shadow-cyan-500/50 flex items-center justify-center text-white text-2xl active:scale-95 transition-transform border-2 border-slate-800">
                    <i class="fa-solid fa-power-off"></i>
                </button>
            </div>
            <button onclick="navigateTo('system')" class="nav-btn flex flex-col items-center gap-1 text-slate-500 hover:text-cyan-400 transition-colors">
                <i class="fa-solid fa-server text-xl"></i>
                <span class="text-[10px] font-medium">System</span>
            </button>
            <button onclick="navigateTo('settings')" class="nav-btn flex flex-col items-center gap-1 text-slate-500 hover:text-cyan-400 transition-colors">
                <i class="fa-solid fa-gear text-xl"></i>
                <span class="text-[10px] font-medium">Settings</span>
            </button>
        </nav>

        <div id="detail-modal" class="modal-overlay" onclick="if(event.target === this) closeDetailModal()">
            <div class="modal-content" id="modal-dynamic-content">
                </div>
        </div>

        <div id="action-menu" class="fixed inset-0 bg-black/80 z-40 hidden flex items-end justify-center pb-24 px-4 backdrop-blur-sm">
            <div class="w-full max-w-[440px] glass-card p-6 transform transition-all translate-y-full opacity-0" id="action-sheet">
                <h3 class="text-lg font-bold mb-4">Quick Controls</h3>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="setPriority('solar')" class="p-4 rounded-xl bg-slate-800 border border-slate-700 flex flex-col items-center gap-2 hover:bg-slate-700 transition-colors">
                        <i class="fa-solid fa-sun text-yellow-400 text-2xl"></i>
                        <span class="text-sm">Prioritize Solar</span>
                    </button>
                    <button onclick="setPriority('wind')" class="p-4 rounded-xl bg-slate-800 border border-slate-700 flex flex-col items-center gap-2 hover:bg-slate-700 transition-colors">
                        <i class="fa-solid fa-wind text-blue-400 text-2xl"></i>
                        <span class="text-sm">Prioritize Wind</span>
                    </button>
                    <button onclick="toggleLoad('ac')" class="p-4 rounded-xl bg-slate-800 border border-slate-700 flex flex-col items-center gap-2 hover:bg-slate-700 transition-colors">
                        <i class="fa-solid fa-plug text-green-400 text-2xl"></i>
                        <span class="text-sm">Toggle AC Loads</span>
                    </button>
                    <button onclick="toggleActionMenu()" class="p-4 rounded-xl bg-red-500/10 border border-red-500/30 flex flex-col items-center gap-2 text-red-400 hover:bg-red-500/20 transition-colors">
                        <i class="fa-solid fa-xmark text-2xl"></i>
                        <span class="text-sm">Close</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- State Management ---
        const state = {
            view: 'dashboard',
            theme: 'blue',
            activeModal: null, // Tracks if a modal is open for live updates
            weather: { temp: 20, condition: 'Clear', windSpeed: 5, cloudCover: 10, isDay: true, irradiance: 800 },
            system: {
                battery: { capacity: 10000, current: 7500, percentage: 75, status: 'Discharging', health: 98 },
                solar: { installed: 5000, current: 0, efficiency: 0.185, status: 'Online' },
                wind: { installed: 2000, current: 0, status: 'Online' },
                inverter: { capacity: 3000, load: 0, efficiency: 0.92, status: 'Online' },
                loads: { dc: 150, ac: 450, bulbActive: true },
                priority: 'auto'
            },
            history: { solar: [], wind: [], battery: [], timeLabels: [] }
        };

        // Static 7-Day Forecast Mock Data
        const weeklyForecast = [
            { day: 'Mon', icon: 'fa-sun', temp: '34°', color: 'text-yellow-400' },
            { day: 'Tue', icon: 'fa-cloud-sun', temp: '32°', color: 'text-yellow-300' },
            { day: 'Wed', icon: 'fa-cloud', temp: '30°', color: 'text-slate-300' },
            { day: 'Thu', icon: 'fa-cloud-showers-heavy', temp: '26°', color: 'text-blue-400' },
            { day: 'Fri', icon: 'fa-cloud-sun-rain', temp: '28°', color: 'text-blue-300' },
            { day: 'Sat', icon: 'fa-sun', temp: '33°', color: 'text-yellow-400' },
            { day: 'Sun', icon: 'fa-sun', temp: '35°', color: 'text-yellow-400' }
        ];

        // --- ThingSpeak Configuration ---
        const CLOUD_CONFIG = { enabled: true, channelID: 3221689, writeKey: "8ER3WZZ2T8VJBGU5", lastUpdate: 0 };
        let historyChart = null;

        // --- Modal Control Functions ---
        function openDetailModal(type) {
            const modal = document.getElementById('detail-modal');
            const content = document.getElementById('modal-dynamic-content');
            state.activeModal = type;

            // Build Horizontal Forecast Strip
            let forecastHTML = `
                <div class="mt-6 border-t border-slate-700/50 pt-4">
                    <h4 class="text-[10px] font-semibold text-slate-400 uppercase tracking-wider mb-3">7-Day Prediction</h4>
                    <div class="flex gap-2 overflow-x-auto hide-scroll pb-2">
            `;
            weeklyForecast.forEach(f => {
                forecastHTML += `
                    <div class="flex flex-col items-center min-w-[55px] bg-slate-800/40 rounded-xl py-2.5 border border-slate-700/50">
                        <span class="text-[10px] text-slate-400 font-medium">${f.day}</span>
                        <i class="fa-solid ${f.icon} my-2 ${f.color} text-sm"></i>
                        <span class="text-xs font-bold text-white">${f.temp}</span>
                    </div>
                `;
            });
            forecastHTML += `</div></div>`;

            if (type === 'solar') {
                content.innerHTML = `
                    <div class="flex justify-between items-start mb-6">
                        <div class="flex items-center gap-4">
                            <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-yellow-400 to-orange-500 flex items-center justify-center shadow-lg shadow-orange-500/20 border border-orange-400/30">
                                <i class="fa-solid fa-solar-panel text-white text-2xl"></i>
                            </div>
                            <div>
                                <h3 class="text-xl font-bold text-white tracking-tight">Solar Array</h3>
                                <p class="text-xs text-green-400 font-medium flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-green-400"></span> Generating Optimal</p>
                            </div>
                        </div>
                        <button onclick="closeDetailModal()" class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center text-slate-400 hover:text-white hover:bg-slate-700 transition-colors"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="glass-panel p-4 rounded-2xl flex flex-col justify-center">
                            <span class="text-[10px] text-slate-400 uppercase tracking-wider font-semibold mb-1">Live Output</span>
                            <span class="text-2xl font-bold text-yellow-400 tracking-tight"><span id="modal-solar-val">${state.system.solar.current}</span><span class="text-xs text-slate-500 ml-1">W</span></span>
                        </div>
                        <div class="glass-panel p-4 rounded-2xl flex flex-col justify-center">
                            <span class="text-[10px] text-slate-400 uppercase tracking-wider font-semibold mb-1">Panel Temp</span>
                            <span class="text-2xl font-bold text-white tracking-tight">42.5<span class="text-xs text-slate-500 ml-1">°C</span></span>
                        </div>
                        <div class="glass-panel p-4 rounded-2xl flex flex-col justify-center">
                            <span class="text-[10px] text-slate-400 uppercase tracking-wider font-semibold mb-1">Efficiency</span>
                            <span class="text-2xl font-bold text-white tracking-tight">${(state.system.solar.efficiency * 100).toFixed(1)}<span class="text-xs text-slate-500 ml-1">%</span></span>
                        </div>
                        <div class="glass-panel p-4 rounded-2xl flex flex-col justify-center">
                            <span class="text-[10px] text-slate-400 uppercase tracking-wider font-semibold mb-1">Irradiance</span>
                            <span class="text-2xl font-bold text-white tracking-tight"><span id="modal-irradiance">${Math.round(state.weather.irradiance)}</span><span class="text-xs text-slate-500 ml-1">W/m²</span></span>
                        </div>
                    </div>
                    ${forecastHTML}
                `;
            } else if (type === 'wind') {
                const rpm = state.system.wind.current > 0 ? Math.round((state.weather.windSpeed * 8) + (Math.random()*5)) : 0;
                content.innerHTML = `
                    <div class="flex justify-between items-start mb-6">
                        <div class="flex items-center gap-4">
                            <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-blue-400 to-cyan-600 flex items-center justify-center shadow-lg shadow-blue-500/20 border border-blue-400/30">
                                <i class="fa-solid fa-wind text-white text-2xl"></i>
                            </div>
                            <div>
                                <h3 class="text-xl font-bold text-white tracking-tight">Wind Turbine</h3>
                                <p class="text-xs text-green-400 font-medium flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-green-400"></span> Active Rotation</p>
                            </div>
                        </div>
                        <button onclick="closeDetailModal()" class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center text-slate-400 hover:text-white hover:bg-slate-700 transition-colors"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="glass-panel p-4 rounded-2xl flex flex-col justify-center">
                            <span class="text-[10px] text-slate-400 uppercase tracking-wider font-semibold mb-1">Live Output</span>
                            <span class="text-2xl font-bold text-cyan-400 tracking-tight"><span id="modal-wind-val">${state.system.wind.current}</span><span class="text-xs text-slate-500 ml-1">W</span></span>
                        </div>
                        <div class="glass-panel p-4 rounded-2xl flex flex-col justify-center">
                            <span class="text-[10px] text-slate-400 uppercase tracking-wider font-semibold mb-1">Wind Speed</span>
                            <span class="text-2xl font-bold text-white tracking-tight"><span id="modal-wind-speed">${state.weather.windSpeed}</span><span class="text-xs text-slate-500 ml-1">m/s</span></span>
                        </div>
                        <div class="glass-panel p-4 rounded-2xl flex flex-col justify-center">
                            <span class="text-[10px] text-slate-400 uppercase tracking-wider font-semibold mb-1">Turbine Speed</span>
                            <span class="text-2xl font-bold text-white tracking-tight"><span id="modal-wind-rpm">${rpm}</span><span class="text-xs text-slate-500 ml-1">rpm</span></span>
                        </div>
                        <div class="glass-panel p-4 rounded-2xl flex flex-col justify-center">
                            <span class="text-[10px] text-slate-400 uppercase tracking-wider font-semibold mb-1">CO2 / Humidity</span>
                            <div class="flex items-baseline gap-2">
                                <span class="text-xl font-bold text-white tracking-tight">64%</span>
                                <span class="text-xs font-semibold text-green-400 bg-green-400/10 px-1.5 rounded">-1.2kg</span>
                            </div>
                        </div>
                    </div>
                    ${forecastHTML}
                `;
            }
            
            modal.classList.add('active');
        }

        function closeDetailModal() {
            document.getElementById('detail-modal').classList.remove('active');
            setTimeout(() => { state.activeModal = null; }, 300); // Wait for animation to finish
        }

        // --- Core Simulation Logic ---
        function updateSimulation() {
            // Solar Calculation
            let solarFactor = (1 - (state.weather.cloudCover / 100));
            if (!state.weather.isDay) solarFactor = 0;
            const solarNoise = 1 + (Math.random() * 0.05 - 0.025);
            state.system.solar.current = Math.max(0, Math.round(state.system.solar.installed * solarFactor * (state.weather.irradiance / 1000) * solarNoise));
            if(state.system.solar.current > state.system.solar.installed) state.system.solar.current = state.system.solar.installed;

            // Wind Calculation
            const windSpeed = state.weather.windSpeed;
            let windPower = 0;
            if (windSpeed >= 3 && windSpeed <= 25) {
                const ratedSpeed = 12;
                if (windSpeed >= ratedSpeed) { windPower = state.system.wind.installed; } 
                else { windPower = state.system.wind.installed * Math.pow((windSpeed - 3) / (ratedSpeed - 3), 3); }
            }
            const windNoise = 1 + (Math.random() * 0.1 - 0.05);
            state.system.wind.current = Math.max(0, Math.round(windPower * windNoise));

            // Load & Battery Management
            let totalDCGeneration = state.system.solar.current + state.system.wind.current;
            let acLoadWatts = state.system.loads.ac + (state.system.loads.bulbActive ? 20 : 0) + Math.round(Math.random() * 20 - 10);
            if(acLoadWatts < 0) acLoadWatts = 0;
            
            let dcRequiredForInverter = acLoadWatts / state.system.inverter.efficiency;
            state.system.inverter.load = acLoadWatts;
            let totalConsumption = state.system.loads.dc + dcRequiredForInverter;

            let netPower = totalDCGeneration - totalConsumption;
            let energyChangeWh = netPower * (3 / 3600); 
            state.system.battery.current += energyChangeWh;
            
            if (state.system.battery.current > state.system.battery.capacity) {
                state.system.battery.current = state.system.battery.capacity; state.system.battery.status = 'Fully Charged';
            } else if (state.system.battery.current < 0) {
                state.system.battery.current = 0; state.system.battery.status = 'Empty';
            } else {
                state.system.battery.status = netPower >= 0 ? 'Charging' : 'Discharging';
            }
            state.system.battery.percentage = ((state.system.battery.current / state.system.battery.capacity) * 100).toFixed(1);

            // Update UI
            if (new Date().getSeconds() % 5 === 0) updateHistory();
            if (document.getElementById('dash-view')) updateDashboardUI();
            if (document.getElementById('system-view')) updateSystemUI();
        }

        function updateHistory() {
            const now = new Date();
            const timeLabel = `${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;
            state.history.solar.push(state.system.solar.current);
            state.history.wind.push(state.system.wind.current);
            state.history.timeLabels.push(timeLabel);
            if (state.history.solar.length > 20) {
                state.history.solar.shift(); state.history.wind.shift(); state.history.timeLabels.shift();
            }
            if (state.view === 'analysis' && historyChart) {
                historyChart.data.labels = state.history.timeLabels;
                historyChart.data.datasets[0].data = state.history.solar;
                historyChart.data.datasets[1].data = state.history.wind;
                historyChart.update();
            }
        }

        // --- Weather API Integration ---
        async function fetchWeather() {
            try {
                const lat = 17.2064, lon = 78.6011; // Hyderabad
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,is_day,precipitation,cloud_cover,wind_speed_10m,direct_radiation`;
                const response = await fetch(url);
                const data = await response.json();
                const current = data.current;
                
                state.weather.temp = current.temperature_2m;
                state.weather.windSpeed = (current.wind_speed_10m / 3.6).toFixed(1); 
                state.weather.cloudCover = current.cloud_cover;
                state.weather.isDay = current.is_day === 1;
                state.weather.irradiance = current.direct_radiation;
                
                if (current.precipitation > 0) state.weather.condition = 'Rainy';
                else if (current.cloud_cover > 70) state.weather.condition = 'Cloudy';
                else if (current.cloud_cover > 30) state.weather.condition = 'Partly Cloudy';
                else state.weather.condition = 'Clear';

                updateWeatherUI();
            } catch (error) { console.error("Weather API failed"); }
        }

        function updateWeatherUI() {
            document.getElementById('weather-temp').innerText = `${state.weather.temp}°C`;
            document.getElementById('weather-desc').innerText = `${state.weather.condition}`;
            const iconContainer = document.getElementById('weather-icon');
            let iconClass = 'fa-sun';
            if (!state.weather.isDay) iconClass = 'fa-moon';
            else if (state.weather.condition === 'Rainy') iconClass = 'fa-cloud-rain';
            else if (state.weather.condition === 'Cloudy') iconClass = 'fa-cloud';
            else if (state.weather.condition === 'Partly Cloudy') iconClass = 'fa-cloud-sun';
            iconContainer.innerHTML = `<i class="fa-solid ${iconClass} ${state.weather.isDay ? 'text-yellow-400' : 'text-slate-300'}"></i>`;
        }

        // --- Navigation & View Rendering ---
        function navigateTo(viewName) {
            state.view = viewName;
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('text-cyan-400'); btn.classList.add('text-slate-500');
            });
            const content = document.getElementById('content-area');
            content.innerHTML = ''; 
            const btns = document.querySelectorAll('.nav-btn');
            if(viewName==='dashboard') btns[0].classList.add('text-cyan-400');
            if(viewName==='analysis') btns[1].classList.add('text-cyan-400');
            if(viewName==='system') btns[3].classList.add('text-cyan-400');
            if(viewName==='settings') btns[4].classList.add('text-cyan-400');

            if (viewName === 'dashboard') renderDashboard(content);
            else if (viewName === 'analysis') renderAnalysis(content);
            else if (viewName === 'system') renderSystem(content);
            else if (viewName === 'settings') renderSettings(content);
        }

        function renderDashboard(container) {
            container.innerHTML = `
                <div id="dash-view" class="space-y-4 fade-in">
                    <div class="glass-card p-6 relative overflow-hidden">
                        <div class="absolute -right-4 -bottom-4 opacity-5"><i class="fa-solid fa-battery-full text-9xl"></i></div>
                        <h2 class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-4">Core Storage (10kWh Li-ion)</h2>
                        <div class="flex items-center justify-between mb-3">
                            <div>
                                <div class="text-4xl font-bold text-white tracking-tight"><span id="batt-pct">--</span>%</div>
                                <div class="text-xs font-medium text-slate-400 mt-1"><span id="batt-current">--</span> kWh Available</div>
                            </div>
                            <div class="text-right">
                                <div id="batt-status" class="text-[10px] font-bold px-2.5 py-1 rounded bg-green-500/20 text-green-400 uppercase tracking-wider inline-block">--</div>
                                <div class="text-xs font-medium text-slate-400 mt-2" id="time-remaining">--h left</div>
                            </div>
                        </div>
                        <div class="w-full bg-slate-800/80 h-2.5 rounded-full overflow-hidden mt-3 border border-slate-700/50">
                            <div id="batt-bar" class="bg-gradient-to-r from-cyan-400 to-blue-500 h-full rounded-full transition-all duration-500 shadow-[0_0_10px_rgba(56,189,248,0.5)]" style="width: 0%"></div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="openDetailModal('solar')" class="glass-card p-5 flex flex-col items-center justify-center relative hover:bg-slate-700/40 transition-all duration-300 group overflow-hidden border border-slate-700/50 hover:border-slate-500 text-left active:scale-95">
                            <div class="absolute inset-0 bg-gradient-to-br from-yellow-500/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                            <div class="w-12 h-12 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center mb-3 text-yellow-400 shadow-inner">
                                <i class="fa-solid fa-solar-panel text-xl group-hover:scale-110 transition-transform duration-300"></i>
                            </div>
                            <div class="text-xs font-bold text-slate-300 uppercase tracking-wide">Solar Array</div>
                            <div class="mt-1 flex items-baseline gap-1"><span id="dash-solar-val" class="text-2xl font-bold text-white">0</span><span class="text-xs text-yellow-500 font-semibold">W</span></div>
                            <div class="mt-2 text-[9px] text-slate-500 flex items-center gap-1"><i class="fa-solid fa-circle-info"></i> Tap for details</div>
                        </button>
                        
                        <button onclick="openDetailModal('wind')" class="glass-card p-5 flex flex-col items-center justify-center relative hover:bg-slate-700/40 transition-all duration-300 group overflow-hidden border border-slate-700/50 hover:border-slate-500 text-left active:scale-95">
                            <div class="absolute inset-0 bg-gradient-to-br from-cyan-500/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                            <div class="w-12 h-12 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center mb-3 text-cyan-400 shadow-inner">
                                <i class="fa-solid fa-wind text-xl group-hover:scale-110 transition-transform duration-300"></i>
                            </div>
                            <div class="text-xs font-bold text-slate-300 uppercase tracking-wide">Wind Turbine</div>
                            <div class="mt-1 flex items-baseline gap-1"><span id="dash-wind-val" class="text-2xl font-bold text-white">0</span><span class="text-xs text-cyan-500 font-semibold">W</span></div>
                            <div class="mt-2 text-[9px] text-slate-500 flex items-center gap-1"><i class="fa-solid fa-circle-info"></i> Tap for details</div>
                        </button>
                    </div>

                    <div class="glass-card p-5">
                        <h3 class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-4">Active Consumption</h3>
                        <div class="space-y-4">
                            <div>
                                <div class="flex justify-between text-sm mb-1.5"><span class="flex items-center gap-2 font-medium"><i class="fa-solid fa-plug text-green-400"></i> AC Load</span><span class="font-bold text-white"><span id="ac-load-val">0</span> W</span></div>
                                <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden border border-slate-700/50"><div id="ac-bar" class="bg-gradient-to-r from-green-500 to-emerald-400 h-full rounded-full shadow-[0_0_8px_rgba(52,211,153,0.5)]" style="width: 0%"></div></div>
                            </div>
                            <div>
                                <div class="flex justify-between text-sm mb-1.5"><span class="flex items-center gap-2 font-medium"><i class="fa-solid fa-microchip text-purple-400"></i> DC Load</span><span class="font-bold text-white"><span id="dc-load-val">0</span> W</span></div>
                                <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden border border-slate-700/50"><div id="dc-bar" class="bg-gradient-to-r from-purple-500 to-fuchsia-400 h-full rounded-full shadow-[0_0_8px_rgba(168,85,247,0.5)]" style="width: 0%"></div></div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            updateDashboardUI();
        }
        
        function updateDashboardUI() {
            // Update Battery
            const battPct = parseFloat(state.system.battery.percentage);
            document.getElementById('batt-pct').innerText = battPct;
            document.getElementById('batt-current').innerText = (state.system.battery.current / 1000).toFixed(2);
            document.getElementById('batt-bar').style.width = `${battPct}%`;
            
            const battStatusEl = document.getElementById('batt-status');
            battStatusEl.innerText = state.system.battery.status;
            battStatusEl.className = `text-[10px] font-bold px-2.5 py-1 rounded uppercase tracking-wider inline-block ${state.system.battery.status === 'Charging' ? 'bg-green-500/20 text-green-400' : 'bg-orange-500/20 text-orange-400'}`;

            const netLoad = (state.system.inverter.load / state.system.inverter.efficiency) + state.system.loads.dc;
            const netGen = state.system.solar.current + state.system.wind.current;
            const netFlow = netGen - netLoad;
            let timeMsg = "Balanced";
            if (netFlow < 0) {
                const hours = state.system.battery.current / Math.abs(netFlow);
                timeMsg = hours > 24 ? "> 24h" : `${hours.toFixed(1)}h left`;
            } else if (netFlow > 0 && battPct < 100) {
                const hours = (state.system.battery.capacity - state.system.battery.current) / netFlow;
                timeMsg = `${hours.toFixed(1)}h to full`;
            }
            document.getElementById('time-remaining').innerText = timeMsg;

            // Update Dash Cards
            document.getElementById('dash-solar-val').innerText = state.system.solar.current;
            document.getElementById('dash-wind-val').innerText = state.system.wind.current;

            // Update Consumption
            document.getElementById('ac-load-val').innerText = state.system.inverter.load;
            document.getElementById('ac-bar').style.width = `${(state.system.inverter.load / state.system.inverter.capacity) * 100}%`;
            document.getElementById('dc-load-val').innerText = state.system.loads.dc;
            document.getElementById('dc-bar').style.width = `${(state.system.loads.dc / 1000) * 100}%`;

            // NEW: Live Update for Active Modal
            if (state.activeModal === 'solar' && document.getElementById('modal-solar-val')) {
                document.getElementById('modal-solar-val').innerText = state.system.solar.current;
                document.getElementById('modal-irradiance').innerText = Math.round(state.weather.irradiance);
            }
            if (state.activeModal === 'wind' && document.getElementById('modal-wind-val')) {
                document.getElementById('modal-wind-val').innerText = state.system.wind.current;
                document.getElementById('modal-wind-speed').innerText = state.weather.windSpeed;
                const rpm = state.system.wind.current > 0 ? Math.round((state.weather.windSpeed * 8) + (Math.random()*5)) : 0;
                document.getElementById('modal-wind-rpm').innerText = rpm;
            }
        }

        function renderAnalysis(container) {
            container.innerHTML = `
                <div class="space-y-4 fade-in">
                    <h2 class="text-xl font-bold">Data Analytics</h2>
                    <div class="glass-card p-5">
                        <div class="flex items-center justify-between mb-4"><h3 class="text-xs font-bold uppercase tracking-widest text-slate-400">Power Curve</h3></div>
                        <div class="h-52 w-full"><canvas id="historyChart"></canvas></div>
                    </div>
                </div>
            `;
            if (historyChart) historyChart.destroy();
            const ctx = document.getElementById('historyChart').getContext('2d');
            historyChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: state.history.timeLabels,
                    datasets: [
                        { label: 'Solar (W)', data: state.history.solar, borderColor: '#fbbf24', backgroundColor: 'rgba(251, 191, 36, 0.1)', fill: true, tension: 0.4, pointRadius: 0, borderWidth: 2 },
                        { label: 'Wind (W)', data: state.history.wind, borderColor: '#38bdf8', backgroundColor: 'rgba(56, 189, 248, 0.1)', fill: true, tension: 0.4, pointRadius: 0, borderWidth: 2 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#cbd5e1', font: { family: 'Inter', size: 11 } } } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } }, x: { display: false } } }
            });
        }

        function renderSystem(container) {
            container.innerHTML = `
                <div id="system-view" class="space-y-3 fade-in">
                    <h2 class="text-xl font-bold mb-4">Hardware Status</h2>
                    ${renderComponentCard('sys-solar', 'Solar Array', '5kW Mono', state.system.solar.status, 'fa-solar-panel text-yellow-500')}
                    ${renderComponentCard('sys-wind', 'Wind Turbine', '2kW VAWT', state.system.wind.status, 'fa-wind text-cyan-400')}
                    ${renderComponentCard('sys-batt', 'Battery Bank', '10kWh BMS', state.system.battery.status, 'fa-battery-full text-green-400')}
                </div>
            `;
        }
        
        function renderComponentCard(id, title, sub, status, icon) {
            return `<div class="glass-card p-4 flex items-center justify-between"><div class="flex items-center gap-4"><div class="w-10 h-10 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center"><i class="fa-solid ${icon}"></i></div><div><div class="font-bold text-sm text-white">${title}</div><div class="text-xs text-slate-400">${sub}</div></div></div><div class="text-xs font-bold text-green-400 bg-green-400/10 px-2 py-1 rounded" id="${id}-status">${status}</div></div>`;
        }

        function renderSettings(container) {
            container.innerHTML = `
                <div class="space-y-6 fade-in">
                    <h2 class="text-xl font-bold">Preferences</h2>
                    <div class="glass-card p-5"><h3 class="text-xs font-bold text-slate-400 uppercase mb-4">Simulation Controls</h3>
                    <button onclick="toggleDayNight()" class="w-full py-3 bg-slate-800 rounded-xl text-sm font-medium border border-slate-700 hover:bg-slate-700 transition-colors flex justify-between px-4 items-center"><span>Toggle Day/Night</span><i class="fa-solid fa-circle-half-stroke"></i></button></div>
                </div>
            `;
        }

        // --- Utils ---
        function toggleActionMenu() { const m = document.getElementById('action-menu'), s = document.getElementById('action-sheet'); if (m.classList.contains('hidden')) { m.classList.remove('hidden'); setTimeout(() => s.classList.remove('translate-y-full', 'opacity-0'), 10); } else { s.classList.add('translate-y-full', 'opacity-0'); setTimeout(() => m.classList.add('hidden'), 300); } }
        function setPriority(p) { state.system.priority = p; toggleActionMenu(); }
        function toggleLoad(t) { if (t === 'ac') state.system.loads.ac = state.system.loads.ac > 0 ? 0 : 450; }
        function toggleDayNight() { state.weather.isDay = !state.weather.isDay; updateWeatherUI(); }

        // --- Init ---
        (function init() {
            fetchWeather();
            setInterval(updateSimulation, 3000); 
            setInterval(fetchWeather, 600000);
            renderDashboard(document.getElementById('content-area'));
        })();
    </script>
</body>
</html>
