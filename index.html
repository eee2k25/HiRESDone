<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HiRES Energy Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            overflow: hidden;
            transition: background 0.8s ease;
        }

        /* Upgraded Premium Gradients */
        body.theme-blue { background: radial-gradient(circle at 80% 0%, #1e293b, #020617); }
        body.theme-green { background: radial-gradient(circle at 80% 0%, #14532d, #022c22); }
        body.theme-amber { background: radial-gradient(circle at 80% 0%, #451a03, #2a1205); }

        /* Refined Enterprise Glassmorphism */
        .glass {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        
        .glass-card {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.7) 0%, rgba(15, 23, 42, 0.4) 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.25rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        /* Animations */
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pulse-dot { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        /* App Modal Spring Animation Classes */
        .modal-overlay { transition: opacity 0.3s ease-out; }
        .modal-content { transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        
        /* Hide Scrollbar for Horizontal Lists */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        /* Mobile Layout Refinements */
        #app-container {
            max-width: 480px;
            margin: 0 auto;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            background: transparent;
        }

        #content-area {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 90px;
            scrollbar-width: none;
            scroll-behavior: smooth;
        }
        #content-area::-webkit-scrollbar { display: none; }

    </style>
</head>
<body>
    <div id="app-container">
        <!-- Header -->
        <header class="glass z-20 px-6 py-4 flex justify-between items-center sticky top-0 border-b border-slate-700/50">
            <div>
                <h1 class="text-xl font-bold tracking-tight text-white flex items-center gap-2">
                    <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center shadow-lg shadow-cyan-500/30">
                        <i class="fa-solid fa-bolt text-white text-sm"></i>
                    </div>
                    HiRES
                </h1>
                <div class="flex items-center gap-1.5 mt-1">
                    <div class="w-2 h-2 rounded-full bg-green-500 pulse-dot" id="live-indicator"></div>
                    <p class="text-[10px] font-medium text-slate-400 uppercase tracking-wider" id="connection-status">System Online</p>
                </div>
            </div>
            <div class="flex items-center gap-3 bg-slate-800/50 py-1.5 px-3 rounded-2xl border border-slate-700/50">
                <div class="text-right">
                    <div id="weather-temp" class="text-sm font-bold text-slate-100">--°C</div>
                    <div id="weather-desc" class="text-[10px] text-slate-400 font-medium">Loading...</div>
                </div>
                <div id="weather-icon" class="text-cyan-400 text-lg">
                    <i class="fa-solid fa-cloud"></i>
                </div>
            </div>
        </header>

        <!-- Main Content Area -->
        <main id="content-area" class="px-4 py-4 space-y-4"></main>

        <!-- Bottom Navigation -->
        <nav class="glass absolute bottom-0 w-full pb-safe pt-2 px-6 pb-4 flex justify-between items-center z-30 rounded-t-2xl border-t border-slate-700">
            <button onclick="navigateTo('dashboard')" class="nav-btn active flex flex-col items-center gap-1 text-cyan-400 transition-colors">
                <i class="fa-solid fa-chart-pie text-xl"></i>
                <span class="text-[10px] font-medium">Monitor</span>
            </button>
            <button onclick="navigateTo('analysis')" class="nav-btn flex flex-col items-center gap-1 text-slate-500 hover:text-cyan-400 transition-colors">
                <i class="fa-solid fa-chart-line text-xl"></i>
                <span class="text-[10px] font-medium">Analysis</span>
            </button>
            <div class="relative -top-6">
                <button onclick="toggleActionMenu()" class="w-14 h-14 rounded-full bg-cyan-500 shadow-lg shadow-cyan-500/50 flex items-center justify-center text-white text-2xl active:scale-95 transition-transform">
                    <i class="fa-solid fa-power-off"></i>
                </button>
            </div>
            <button onclick="navigateTo('system')" class="nav-btn flex flex-col items-center gap-1 text-slate-500 hover:text-cyan-400 transition-colors">
                <i class="fa-solid fa-server text-xl"></i>
                <span class="text-[10px] font-medium">System</span>
            </button>
            <button onclick="navigateTo('settings')" class="nav-btn flex flex-col items-center gap-1 text-slate-500 hover:text-cyan-400 transition-colors">
                <i class="fa-solid fa-gear text-xl"></i>
                <span class="text-[10px] font-medium">Settings</span>
            </button>
        </nav>

        <!-- Action Menu Overlay -->
        <div id="action-menu" class="fixed inset-0 bg-black/80 z-40 hidden flex items-end justify-center pb-24 px-4 backdrop-blur-sm">
            <div class="w-full max-w-[440px] glass-card p-6 transform transition-all translate-y-full opacity-0" id="action-sheet">
                <h3 class="text-lg font-bold mb-4">Quick Controls</h3>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="setPriority('solar')" class="p-4 rounded-xl bg-slate-800 border border-slate-700 flex flex-col items-center gap-2 hover:bg-slate-700">
                        <i class="fa-solid fa-sun text-yellow-400 text-2xl"></i>
                        <span class="text-sm">Prioritize Solar</span>
                    </button>
                    <button onclick="setPriority('wind')" class="p-4 rounded-xl bg-slate-800 border border-slate-700 flex flex-col items-center gap-2 hover:bg-slate-700">
                        <i class="fa-solid fa-wind text-blue-400 text-2xl"></i>
                        <span class="text-sm">Prioritize Wind</span>
                    </button>
                    <button onclick="toggleLoad('ac')" class="p-4 rounded-xl bg-slate-800 border border-slate-700 flex flex-col items-center gap-2 hover:bg-slate-700">
                        <i class="fa-solid fa-plug text-green-400 text-2xl"></i>
                        <span class="text-sm">Toggle AC Loads</span>
                    </button>
                    <button onclick="toggleActionMenu()" class="p-4 rounded-xl bg-red-500/20 border border-red-500/50 flex flex-col items-center gap-2 text-red-200">
                        <i class="fa-solid fa-xmark text-2xl"></i>
                        <span class="text-sm">Close</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Professional "Mac-like" Full Screen Modal -->
        <div id="app-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay opacity-0 pointer-events-none bg-black/70 backdrop-blur-sm">
            <div id="app-modal-content" class="w-full max-w-md max-h-[90vh] glass-card flex flex-col overflow-y-auto scrollbar-hide modal-content scale-75 translate-y-10 opacity-0 relative">
                <!-- Content injected dynamically via JS -->
            </div>
        </div>

    </div>

    <script>
        // --- State Management ---
        const state = {
            view: 'dashboard',
            detailView: null, // Track if 'solar' or 'wind' modal is open
            theme: 'blue',
            weather: { 
                temp: 20, 
                humidity: 45,
                condition: 'Clear', 
                windSpeed: 5, 
                cloudCover: 10, 
                isDay: true, 
                irradiance: 800,
                forecast:[
                    { day: 'Mon', temp: 32, icon: 'fa-sun', condition: 'text-yellow-400' },
                    { day: 'Tue', temp: 30, icon: 'fa-cloud-sun', condition: 'text-yellow-300' },
                    { day: 'Wed', temp: 28, icon: 'fa-cloud-rain', condition: 'text-blue-400' },
                    { day: 'Thu', temp: 29, icon: 'fa-cloud', condition: 'text-slate-400' },
                    { day: 'Fri', temp: 31, icon: 'fa-sun', condition: 'text-yellow-400' },
                    { day: 'Sat', temp: 33, icon: 'fa-sun', condition: 'text-yellow-400' },
                    { day: 'Sun', temp: 32, icon: 'fa-cloud-sun', condition: 'text-yellow-300' }
                ]
            },
            system: {
                battery: { capacity: 10000, current: 7500, percentage: 75, status: 'Discharging', health: 98 },
                solar: { installed: 5000, current: 0, efficiency: 18.5, status: 'Online', panelTemp: 45 },
                wind: { installed: 2000, current: 0, status: 'Online', turbineSpeed: 0 },
                inverter: { capacity: 3000, load: 0, efficiency: 0.92, status: 'Online' },
                loads: { dc: 150, ac: 450, bulbActive: true },
                priority: 'auto',
                co2Saved: 125.4 // in kg
            },
            history: { solar: [], wind: [], battery: [], timeLabels:[] }
        };

        const CLOUD_CONFIG = {
            enabled: true,
            channelID: 3221689,
            writeKey: "8ER3WZZ2T8VJBGU5",
            readKey: "G5BM0SGNZUB9W3ST",
            lastUpdate: 0
        };

        let historyChart = null;

        // --- Core Simulation Logic ---
        function updateSimulation() {
            // Solar Calculation
            let solarFactor = (1 - (state.weather.cloudCover / 100));
            if (!state.weather.isDay) solarFactor = 0;
            const solarNoise = 1 + (Math.random() * 0.05 - 0.025);
            state.system.solar.current = Math.max(0, Math.round(state.system.solar.installed * solarFactor * (state.weather.irradiance / 1000) * solarNoise));
            if(state.system.solar.current > state.system.solar.installed) state.system.solar.current = state.system.solar.installed;
            
            // Dynamic Solar Temp & Eff
            state.system.solar.panelTemp = (state.weather.isDay ? 35 : 15) + (state.weather.irradiance / 100) + (Math.random() * 2 - 1);
            state.system.solar.efficiency = 18.5 - ((state.system.solar.panelTemp - 25) * 0.04); // Temp coefficient drop

            // Wind Calculation
            const windSpeed = state.weather.windSpeed;
            let windPower = 0;
            if (windSpeed >= 3 && windSpeed <= 25) {
                const ratedSpeed = 12;
                if (windSpeed >= ratedSpeed) windPower = state.system.wind.installed;
                else windPower = state.system.wind.installed * Math.pow((windSpeed - 3) / (ratedSpeed - 3), 3);
            }
            const windNoise = 1 + (Math.random() * 0.1 - 0.05);
            state.system.wind.current = Math.max(0, Math.round(windPower * windNoise));
            
            // Dynamic Turbine RPM based on wind output
            state.system.wind.turbineSpeed = state.system.wind.current > 0 ? (state.weather.windSpeed * 8) + (Math.random() * 5) : 0;

            // Load & Battery Management
            let totalDCGeneration = state.system.solar.current + state.system.wind.current;
            let acLoadWatts = state.system.loads.ac + (state.system.loads.bulbActive ? 20 : 0) + Math.round(Math.random() * 20 - 10);
            if(acLoadWatts < 0) acLoadWatts = 0;
            
            let dcRequiredForInverter = acLoadWatts / state.system.inverter.efficiency;
            state.system.inverter.load = acLoadWatts;
            let totalConsumption = state.system.loads.dc + dcRequiredForInverter;

            let netPower = totalDCGeneration - totalConsumption;
            let energyChangeWh = netPower * (3 / 3600); // 3-second tick
            state.system.battery.current += energyChangeWh;
            
            // Increment CO2 saved
            state.system.co2Saved += (totalDCGeneration * (3/3600) / 1000) * 0.4; // rough approx kg CO2/kWh

            if (state.system.battery.current > state.system.battery.capacity) {
                state.system.battery.current = state.system.battery.capacity;
                state.system.battery.status = 'Fully Charged';
            } else if (state.system.battery.current < 0) {
                state.system.battery.current = 0;
                state.system.battery.status = 'Empty';
            } else {
                state.system.battery.status = netPower >= 0 ? 'Charging' : 'Discharging';
            }
            state.system.battery.percentage = ((state.system.battery.current / state.system.battery.capacity) * 100).toFixed(1);

            // Update Views
            if (document.getElementById('dash-view')) updateDashboardUI();
            if (document.getElementById('system-view')) updateSystemUI();
            
            // Update Modal Live Data if open
            if (state.detailView) updateDetailUI();
            
            if (new Date().getSeconds() % 5 === 0) updateHistory();
        }

        function updateHistory() {
            const now = new Date();
            const timeLabel = `${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;
            state.history.solar.push(state.system.solar.current);
            state.history.wind.push(state.system.wind.current);
            state.history.battery.push(state.system.battery.percentage);
            state.history.timeLabels.push(timeLabel);
            if (state.history.solar.length > 20) {
                state.history.solar.shift(); state.history.wind.shift();
                state.history.battery.shift(); state.history.timeLabels.shift();
            }
            if (state.view === 'analysis' && historyChart) {
                historyChart.data.labels = state.history.timeLabels;
                historyChart.data.datasets[0].data = state.history.solar;
                historyChart.data.datasets[1].data = state.history.wind;
                historyChart.update();
            }
        }

        // --- Weather & Cloud APIs ---
        async function fetchWeather() {
            try {
                const lat = 17.2064, lon = 78.6011;
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,is_day,precipitation,cloud_cover,wind_speed_10m,direct_radiation`;
                const response = await fetch(url);
                const data = await response.json();
                const current = data.current;
                
                state.weather.temp = current.temperature_2m;
                state.weather.humidity = current.relative_humidity_2m;
                state.weather.windSpeed = (current.wind_speed_10m / 3.6).toFixed(1); 
                state.weather.cloudCover = current.cloud_cover;
                state.weather.isDay = current.is_day === 1;
                state.weather.irradiance = current.direct_radiation;
                
                if (current.precipitation > 0) state.weather.condition = 'Rainy';
                else if (current.cloud_cover > 70) state.weather.condition = 'Cloudy';
                else if (current.cloud_cover > 30) state.weather.condition = 'Partly Cloudy';
                else state.weather.condition = 'Clear';

                updateWeatherUI();
            } catch (error) {
                console.warn("Weather API Simulated");
            }
        }

        async function sendToThingSpeak() {
            if (!CLOUD_CONFIG.enabled) return;
            const now = Date.now();
            if (now - CLOUD_CONFIG.lastUpdate < 20000) return; 

            try {
                const url = `https://api.thingspeak.com/update?api_key=${CLOUD_CONFIG.writeKey}&field1=${state.system.solar.current}&field2=${state.system.wind.current}&field3=${state.system.battery.percentage}&field4=${state.system.inverter.load + state.system.loads.dc}`;
                await fetch(url);
                CLOUD_CONFIG.lastUpdate = now;
            } catch (error) {
                console.error("Cloud Upload Failed");
            }
        }

        function updateWeatherUI() {
            document.getElementById('weather-temp').innerText = `${state.weather.temp}°C`;
            document.getElementById('weather-desc').innerText = `${state.weather.condition}`;
            const iconContainer = document.getElementById('weather-icon');
            let iconClass = 'fa-sun';
            if (!state.weather.isDay) iconClass = 'fa-moon';
            else if (state.weather.condition === 'Rainy') iconClass = 'fa-cloud-rain';
            else if (state.weather.condition === 'Cloudy') iconClass = 'fa-cloud';
            else if (state.weather.condition === 'Partly Cloudy') iconClass = 'fa-cloud-sun';
            iconContainer.innerHTML = `<i class="fa-solid ${iconClass} ${state.weather.isDay ? 'text-yellow-400' : 'text-slate-300'} text-lg"></i>`;
        }

        // --- Mac-like Detail Modal Logic ---
        function openDetail(type) {
            const modal = document.getElementById('app-modal');
            const content = document.getElementById('app-modal-content');
            
            // Build Structure
            content.innerHTML = type === 'solar' ? generateSolarDetails() : generateWindDetails();
            
            // Trigger Animation
            modal.classList.remove('pointer-events-none');
            modal.classList.add('opacity-100');
            
            // Small delay for spring content animation
            setTimeout(() => {
                content.classList.remove('opacity-0', 'scale-75', 'translate-y-10');
                content.classList.add('opacity-100', 'scale-100', 'translate-y-0');
            }, 10);

            state.detailView = type;
            updateDetailUI();
        }

        function closeDetail() {
            const modal = document.getElementById('app-modal');
            const content = document.getElementById('app-modal-content');
            
            // Reverse Animation
            content.classList.remove('opacity-100', 'scale-100', 'translate-y-0');
            content.classList.add('opacity-0', 'scale-75', 'translate-y-10');
            modal.classList.remove('opacity-100');
            modal.classList.add('pointer-events-none');

            setTimeout(() => {
                state.detailView = null;
                content.innerHTML = '';
            }, 300);
        }

        function generateForecastHTML() {
            let html = `<div class="w-full flex overflow-x-auto gap-3 pb-2 pt-1 scrollbar-hide">`;
            state.weather.forecast.forEach(day => {
                html += `
                <div class="flex-shrink-0 w-[4.5rem] glass bg-slate-800/60 rounded-xl p-3 flex flex-col items-center justify-center border border-slate-700/50 hover:bg-slate-700 transition">
                    <span class="text-xs text-slate-400 mb-1 font-medium">${day.day}</span>
                    <i class="fa-solid ${day.icon} ${day.condition} text-xl mb-2 drop-shadow-md"></i>
                    <span class="text-sm font-bold text-white">${day.temp}°</span>
                </div>`;
            });
            html += `</div>`;
            return html;
        }

        function generateSolarDetails() {
            return `
            <div class="p-6">
                <!-- Header -->
                <div class="flex justify-between items-start mb-6">
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-yellow-400 to-orange-500 shadow-lg shadow-orange-500/30 flex items-center justify-center relative">
                            <i class="fa-solid fa-solar-panel text-white text-xl"></i>
                            <i class="fa-solid fa-sun text-yellow-200 text-xs absolute -top-1 -right-1"></i>
                        </div>
                        <div>
                            <h2 class="text-xl font-bold text-white tracking-tight">Solar Array</h2>
                            <p class="text-xs text-slate-400">Monocrystalline 5kW System</p>
                        </div>
                    </div>
                    <button onclick="closeDetail()" class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center text-slate-400 hover:text-white hover:bg-slate-700 transition">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>

                <!-- Stats Grid -->
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <div class="glass bg-slate-800/40 p-4 rounded-2xl border border-slate-700/50">
                        <div class="text-xs font-medium text-slate-400 mb-1 flex items-center gap-1"><i class="fa-solid fa-bolt text-yellow-500"></i> Output</div>
                        <div class="text-2xl font-bold text-white"><span id="modal-solar-val">0</span> <span class="text-sm font-normal text-slate-400">W</span></div>
                    </div>
                    <div class="glass bg-slate-800/40 p-4 rounded-2xl border border-slate-700/50">
                        <div class="text-xs font-medium text-slate-400 mb-1 flex items-center gap-1"><i class="fa-solid fa-temperature-half text-red-400"></i> Panel Temp</div>
                        <div class="text-2xl font-bold text-white"><span id="modal-solar-temp">0.0</span> <span class="text-sm font-normal text-slate-400">°C</span></div>
                    </div>
                    <div class="glass bg-slate-800/40 p-4 rounded-2xl border border-slate-700/50">
                        <div class="text-xs font-medium text-slate-400 mb-1 flex items-center gap-1"><i class="fa-solid fa-percent text-green-400"></i> Efficiency</div>
                        <div class="text-2xl font-bold text-white"><span id="modal-solar-eff">0.0</span> <span class="text-sm font-normal text-slate-400">%</span></div>
                    </div>
                    <div class="glass bg-slate-800/40 p-4 rounded-2xl border border-slate-700/50">
                        <div class="text-xs font-medium text-slate-400 mb-1 flex items-center gap-1"><i class="fa-solid fa-circle-check text-cyan-400"></i> Status</div>
                        <div class="text-xl font-bold text-white mt-1">Optimal</div>
                    </div>
                </div>

                <!-- Forecast -->
                <h3 class="text-sm font-semibold text-slate-200 mb-3">7-Day Forecast</h3>
                ${generateForecastHTML()}
            </div>`;
        }

        function generateWindDetails() {
            return `
            <div class="p-6">
                <!-- Header -->
                <div class="flex justify-between items-start mb-6">
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-cyan-400 to-blue-600 shadow-lg shadow-blue-500/30 flex items-center justify-center">
                            <i class="fa-solid fa-wind text-white text-xl"></i>
                        </div>
                        <div>
                            <h2 class="text-xl font-bold text-white tracking-tight">Wind Turbine</h2>
                            <p class="text-xs text-slate-400">Vertical Axis 2kW System</p>
                        </div>
                    </div>
                    <button onclick="closeDetail()" class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center text-slate-400 hover:text-white hover:bg-slate-700 transition">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>

                <!-- Stats Grid -->
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <div class="glass bg-slate-800/40 p-4 rounded-2xl border border-slate-700/50">
                        <div class="text-xs font-medium text-slate-400 mb-1 flex items-center gap-1"><i class="fa-solid fa-bolt text-blue-400"></i> Output</div>
                        <div class="text-2xl font-bold text-white"><span id="modal-wind-val">0</span> <span class="text-sm font-normal text-slate-400">W</span></div>
                    </div>
                    <div class="glass bg-slate-800/40 p-4 rounded-2xl border border-slate-700/50">
                        <div class="text-xs font-medium text-slate-400 mb-1 flex items-center gap-1"><i class="fa-solid fa-fan text-slate-300"></i> Turbine Speed</div>
                        <div class="text-2xl font-bold text-white"><span id="modal-wind-rpm">0</span> <span class="text-sm font-normal text-slate-400">RPM</span></div>
                    </div>
                    <div class="glass bg-slate-800/40 p-4 rounded-2xl border border-slate-700/50">
                        <div class="text-xs font-medium text-slate-400 mb-1 flex items-center gap-1"><i class="fa-solid fa-wind text-cyan-400"></i> Wind Speed</div>
                        <div class="text-2xl font-bold text-white"><span id="modal-wind-speed">0.0</span> <span class="text-sm font-normal text-slate-400">m/s</span></div>
                    </div>
                    <div class="glass bg-slate-800/40 p-4 rounded-2xl border border-slate-700/50">
                        <div class="text-xs font-medium text-slate-400 mb-1 flex items-center gap-1"><i class="fa-solid fa-droplet text-blue-300"></i> Humidity</div>
                        <div class="text-2xl font-bold text-white"><span id="modal-wind-humidity">0</span> <span class="text-sm font-normal text-slate-400">%</span></div>
                    </div>
                </div>

                <div class="glass bg-green-500/10 border border-green-500/30 p-4 rounded-2xl mb-6 flex justify-between items-center">
                    <div>
                        <div class="text-xs text-green-300/80 mb-1 font-medium">CO2 Emissions Saved</div>
                        <div class="text-xl font-bold text-green-400"><span id="modal-wind-co2">0.00</span> kg</div>
                    </div>
                    <i class="fa-solid fa-leaf text-green-400/50 text-3xl"></i>
                </div>

                <!-- Forecast -->
                <h3 class="text-sm font-semibold text-slate-200 mb-3">7-Day Forecast</h3>
                ${generateForecastHTML()}
            </div>`;
        }

        function updateDetailUI() {
            if (state.detailView === 'solar') {
                const outEl = document.getElementById('modal-solar-val');
                const tempEl = document.getElementById('modal-solar-temp');
                const effEl = document.getElementById('modal-solar-eff');
                if(outEl) outEl.innerText = state.system.solar.current;
                if(tempEl) tempEl.innerText = state.system.solar.panelTemp.toFixed(1);
                if(effEl) effEl.innerText = Math.max(0, state.system.solar.efficiency).toFixed(1);
            } else if (state.detailView === 'wind') {
                const outEl = document.getElementById('modal-wind-val');
                const rpmEl = document.getElementById('modal-wind-rpm');
                const spdEl = document.getElementById('modal-wind-speed');
                const humEl = document.getElementById('modal-wind-humidity');
                const co2El = document.getElementById('modal-wind-co2');
                if(outEl) outEl.innerText = state.system.wind.current;
                if(rpmEl) rpmEl.innerText = Math.round(state.system.wind.turbineSpeed);
                if(spdEl) spdEl.innerText = state.weather.windSpeed;
                if(humEl) humEl.innerText = state.weather.humidity;
                if(co2El) co2El.innerText = state.system.co2Saved.toFixed(2);
            }
        }


        // --- Views ---
        function navigateTo(viewName) {
            state.view = viewName;
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('text-cyan-400');
                btn.classList.add('text-slate-500');
            });
            const content = document.getElementById('content-area');
            content.innerHTML = ''; 
            const buttons = document.querySelectorAll('.nav-btn');
            if(viewName === 'dashboard') buttons[0].classList.add('text-cyan-400');
            if(viewName === 'analysis') buttons[1].classList.add('text-cyan-400');
            if(viewName === 'system') buttons[2].classList.add('text-cyan-400');
            if(viewName === 'settings') buttons[3].classList.add('text-cyan-400');

            if (viewName === 'dashboard') renderDashboard(content);
            else if (viewName === 'analysis') renderAnalysis(content);
            else if (viewName === 'system') renderSystem(content);
            else if (viewName === 'settings') renderSettings(content);
        }

        function renderDashboard(container) {
            container.innerHTML = `
                <div id="dash-view" class="space-y-4 fade-in">
                    
                    <!-- Battery Card -->
                    <div class="glass-card p-5 relative overflow-hidden">
                        <div class="absolute top-0 right-0 p-4 opacity-10"><i class="fa-solid fa-battery-full text-8xl"></i></div>
                        <h2 class="text-sm font-semibold text-slate-300 mb-4">Storage (Li-ion 10kWh)</h2>
                        <div class="flex items-center justify-between mb-2">
                            <div>
                                <div class="text-3xl font-bold text-white"><span id="batt-pct">--</span>%</div>
                                <div class="text-xs text-slate-400 mt-1"><span id="batt-current">--</span> kWh / 10.0 kWh</div>
                            </div>
                            <div class="text-right">
                                <div id="batt-status" class="text-xs font-bold px-2 py-1 rounded bg-green-500/20 text-green-400 uppercase tracking-wider">--</div>
                                <div class="text-xs text-slate-400 mt-2" id="time-remaining">--h remaining</div>
                            </div>
                        </div>
                        <div class="w-full bg-slate-700 h-3 rounded-full overflow-hidden mt-2">
                            <div id="batt-bar" class="bg-gradient-to-r from-cyan-500 to-blue-500 h-full rounded-full transition-all duration-500" style="width: 0%"></div>
                        </div>
                    </div>

                    <!-- Professional App-Like Generation Icons -->
                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="openDetail('solar')" class="glass-card p-5 flex flex-col items-center justify-center relative hover:bg-slate-800/60 transition-all transform active:scale-95 duration-300 border border-slate-700/50">
                            <div class="relative w-16 h-16 rounded-2xl bg-gradient-to-br from-slate-800 to-slate-900 shadow-xl border border-slate-700/50 flex items-center justify-center mb-3">
                                <i class="fa-solid fa-solar-panel text-blue-400 text-3xl relative z-10"></i>
                                <i class="fa-solid fa-sun text-yellow-500 text-xl absolute -top-1.5 -right-1.5 animate-[spin_8s_linear_infinite] drop-shadow-[0_0_8px_rgba(234,179,8,0.6)]"></i>
                            </div>
                            <span class="text-sm font-semibold text-slate-200">Solar Array</span>
                            <div class="flex items-baseline gap-1 mt-1">
                                <span class="text-lg font-bold text-yellow-400" id="dash-solar-val">0</span>
                                <span class="text-[10px] text-slate-400">W</span>
                            </div>
                        </button>

                        <button onclick="openDetail('wind')" class="glass-card p-5 flex flex-col items-center justify-center relative hover:bg-slate-800/60 transition-all transform active:scale-95 duration-300 border border-slate-700/50">
                            <div class="relative w-16 h-16 rounded-2xl bg-gradient-to-br from-slate-800 to-slate-900 shadow-xl border border-slate-700/50 flex items-center justify-center mb-3">
                                <i class="fa-solid fa-wind text-cyan-400 text-3xl"></i>
                            </div>
                            <span class="text-sm font-semibold text-slate-200">Wind Turbine</span>
                            <div class="flex items-baseline gap-1 mt-1">
                                <span class="text-lg font-bold text-cyan-400" id="dash-wind-val">0</span>
                                <span class="text-[10px] text-slate-400">W</span>
                            </div>
                        </button>
                    </div>

                    <!-- Consumption Section -->
                    <div class="glass-card p-4">
                        <h3 class="text-xs font-semibold text-slate-400 mb-3 uppercase tracking-wide">Consumption</h3>
                        <div class="space-y-4">
                            <div>
                                <div class="flex justify-between text-sm mb-1"><span class="flex items-center gap-2"><i class="fa-solid fa-plug text-green-400"></i> AC Load</span><span class="font-bold"><span id="ac-load-val">0</span> W</span></div>
                                <div class="w-full bg-slate-700 h-1.5 rounded-full overflow-hidden"><div id="ac-bar" class="bg-green-400 h-full rounded-full transition-all" style="width: 0%"></div></div>
                            </div>
                            <div>
                                <div class="flex justify-between text-sm mb-1"><span class="flex items-center gap-2"><i class="fa-solid fa-car-battery text-purple-400"></i> DC Load</span><span class="font-bold"><span id="dc-load-val">0</span> W</span></div>
                                <div class="w-full bg-slate-700 h-1.5 rounded-full overflow-hidden"><div id="dc-bar" class="bg-purple-400 h-full rounded-full transition-all" style="width: 0%"></div></div>
                            </div>
                        </div>
                    </div>

                    <!-- Alert -->
                    <div id="alert-area" class="hidden glass-card border-l-4 border-red-500 p-3 bg-red-500/10">
                        <div class="flex items-center gap-3"><i class="fa-solid fa-triangle-exclamation text-red-500"></i><div><div class="text-sm font-bold text-red-100">Warning</div><div class="text-xs text-red-200">Battery level critical (< 20%)</div></div></div>
                    </div>
                </div>
            `;
            updateDashboardUI();
        }
        
        function updateDashboardUI() {
            const battPct = parseFloat(state.system.battery.percentage);
            document.getElementById('batt-pct').innerText = battPct;
            document.getElementById('batt-current').innerText = (state.system.battery.current / 1000).toFixed(2);
            document.getElementById('batt-bar').style.width = `${battPct}%`;
            
            const battStatusEl = document.getElementById('batt-status');
            battStatusEl.innerText = state.system.battery.status;
            battStatusEl.className = `text-xs font-bold px-2 py-1 rounded uppercase tracking-wider ${state.system.battery.status === 'Charging' ? 'bg-green-500/20 text-green-400' : 'bg-orange-500/20 text-orange-400'}`;

            const netLoad = (state.system.inverter.load / state.system.inverter.efficiency) + state.system.loads.dc;
            const netGen = state.system.solar.current + state.system.wind.current;
            const netFlow = netGen - netLoad;
            let timeMsg = "Balanced";
            if (netFlow < 0) {
                const hours = state.system.battery.current / Math.abs(netFlow);
                timeMsg = hours > 24 ? "> 24h" : `${hours.toFixed(1)}h left`;
            } else if (netFlow > 0 && battPct < 100) {
                const hours = (state.system.battery.capacity - state.system.battery.current) / netFlow;
                timeMsg = `${hours.toFixed(1)}h to full`;
            }
            document.getElementById('time-remaining').innerText = timeMsg;

            // Update Dash Cards
            const dashSolarVal = document.getElementById('dash-solar-val');
            const dashWindVal = document.getElementById('dash-wind-val');
            if(dashSolarVal) dashSolarVal.innerText = state.system.solar.current;
            if(dashWindVal) dashWindVal.innerText = state.system.wind.current;

            // Load Bars
            document.getElementById('ac-load-val').innerText = state.system.inverter.load;
            document.getElementById('ac-bar').style.width = `${(state.system.inverter.load / state.system.inverter.capacity) * 100}%`;

            document.getElementById('dc-load-val').innerText = state.system.loads.dc;
            document.getElementById('dc-bar').style.width = `${(state.system.loads.dc / 1000) * 100}%`;

            const alertArea = document.getElementById('alert-area');
            if (battPct < 20) alertArea.classList.remove('hidden'); else alertArea.classList.add('hidden');
        }

        function renderAnalysis(container) {
            container.innerHTML = `
                <div class="space-y-4 fade-in">
                    <h2 class="text-xl font-bold">Performance Analysis</h2>
                    <div class="glass-card p-4">
                        <div class="flex items-center justify-between mb-4"><h3 class="text-sm font-semibold">Generation History</h3><select class="bg-slate-700 text-xs rounded p-1 border-none outline-none"><option>Live</option></select></div>
                        <div class="h-48 w-full"><canvas id="historyChart"></canvas></div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="glass-card p-4"><div class="text-xs text-slate-400">Total Generated</div><div class="text-xl font-bold text-green-400 mt-1">12.5 kWh</div></div>
                        <div class="glass-card p-4"><div class="text-xs text-slate-400">CO2 Saved</div><div class="text-xl font-bold text-cyan-400 mt-1">${state.system.co2Saved.toFixed(1)} kg</div></div>
                    </div>
                </div>
            `;
            if (historyChart) historyChart.destroy();
            const ctx = document.getElementById('historyChart').getContext('2d');
            historyChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: state.history.timeLabels,
                    datasets:[
                        { label: 'Solar (W)', data: state.history.solar, borderColor: '#eab308', tension: 0.4, pointRadius: 0, borderWidth: 2 },
                        { label: 'Wind (W)', data: state.history.wind, borderColor: '#60a5fa', tension: 0.4, pointRadius: 0, borderWidth: 2 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: true, labels: { color: '#94a3b8', font: { size: 10 } } } }, scales: { y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' }, beginAtZero: true }, x: { display: false } } }
            });
        }

        function renderSystem(container) {
            container.innerHTML = `
                <div id="system-view" class="space-y-4 fade-in">
                    <h2 class="text-xl font-bold">Component Health</h2>
                    ${renderComponentCard('sys-solar', 'Solar Arrays', '5kW Monocrystalline', state.system.solar.status, 'fa-solar-panel text-yellow-500')}
                    ${renderComponentCard('sys-wind', 'Wind Turbine', '2kW Vertical Axis', state.system.wind.status, 'fa-wind text-blue-400')}
                    ${renderComponentCard('sys-batt', 'Battery Bank', '10kWh LiFePO4', state.system.battery.status, 'fa-battery-full text-green-400')}
                    ${renderComponentCard('sys-inv', 'Hybrid Inverter', '3kW Pure Sine Wave', state.system.inverter.status, 'fa-server text-slate-400')}
                </div>
            `;
        }
        
        function renderComponentCard(id, title, subtitle, status, iconClass) {
            const isGood = (status === 'Online' || status === 'Charging' || status === 'Discharging' || status === 'Fully Charged');
            return `<div class="glass-card p-4 flex items-center justify-between" id="${id}"><div class="flex items-center gap-4"><div class="w-10 h-10 rounded-xl bg-slate-800 border border-slate-700/50 flex items-center justify-center"><i class="fa-solid ${iconClass} text-lg"></i></div><div><div class="font-semibold text-sm">${title}</div><div class="text-xs text-slate-400">${subtitle}</div></div></div><div class="text-right"><div id="${id}-status" class="text-xs font-bold ${isGood ? 'text-green-400' : 'text-red-400'}">${status}</div></div></div>`;
        }

        function updateSystemUI() {
            if(!document.getElementById('system-view')) return;
            const update = (id, status) => { const el = document.getElementById(`${id}-status`); if(el) { el.innerText = status; el.className = `text-xs font-bold ${(status === 'Online' || status === 'Charging' || status === 'Discharging' || status === 'Fully Charged') ? 'text-green-400' : 'text-red-400'}`; } };
            update('sys-solar', state.system.solar.status); update('sys-wind', state.system.wind.status); update('sys-batt', state.system.battery.status); update('sys-inv', state.system.inverter.status);
        }

        function renderSettings(container) {
            container.innerHTML = `
                <div class="space-y-6 fade-in">
                    <h2 class="text-xl font-bold">Configuration</h2>
                    <div class="glass-card p-4"><h3 class="text-sm font-semibold mb-4">Generation Priority</h3><div class="flex bg-slate-800 rounded-lg p-1"><button onclick="setPriority('auto')" class="flex-1 py-2 text-xs rounded-md font-medium transition-colors ${state.system.priority === 'auto' ? 'bg-cyan-600 text-white' : 'text-slate-400'}">Auto</button><button onclick="setPriority('solar')" class="flex-1 py-2 text-xs rounded-md font-medium transition-colors ${state.system.priority === 'solar' ? 'bg-cyan-600 text-white' : 'text-slate-400'}">Solar</button><button onclick="setPriority('wind')" class="flex-1 py-2 text-xs rounded-md font-medium transition-colors ${state.system.priority === 'wind' ? 'bg-cyan-600 text-white' : 'text-slate-400'}">Wind</button></div></div>
                    <div class="glass-card p-4"><h3 class="text-sm font-semibold mb-4">App Theme</h3><div class="flex gap-3"><button onclick="setTheme('blue')" class="w-10 h-10 rounded-full bg-slate-900 border-2 ${state.theme === 'blue' ? 'border-cyan-400' : 'border-slate-700'}"></button><button onclick="setTheme('green')" class="w-10 h-10 rounded-full bg-green-900 border-2 ${state.theme === 'green' ? 'border-green-400' : 'border-slate-700'}"></button><button onclick="setTheme('amber')" class="w-10 h-10 rounded-full bg-amber-900 border-2 ${state.theme === 'amber' ? 'border-amber-400' : 'border-slate-700'}"></button></div></div>
                    <div class="glass-card p-4"><h3 class="text-sm font-semibold mb-4">Simulation Override</h3><div class="flex items-center justify-between py-2 border-b border-slate-700/50"><span class="text-sm text-slate-300">Simulate Night</span><button onclick="toggleDayNight()" class="text-xs bg-slate-700 px-3 py-1 rounded">Toggle</button></div><div class="flex items-center justify-between py-2"><span class="text-sm text-slate-300">Load (Bulb 20W)</span><button onclick="toggleLoad('bulb')" class="text-xs ${state.system.loads.bulbActive ? 'bg-green-600 text-white' : 'bg-slate-700'} px-3 py-1 rounded">Toggle</button></div></div>
                </div>
            `;
        }

        // --- Core Application Functions ---
        function toggleActionMenu() { const m = document.getElementById('action-menu'), s = document.getElementById('action-sheet'); if (m.classList.contains('hidden')) { m.classList.remove('hidden'); setTimeout(() => s.classList.remove('translate-y-full', 'opacity-0'), 10); } else { s.classList.add('translate-y-full', 'opacity-0'); setTimeout(() => m.classList.add('hidden'), 300); } }
        function setPriority(p) { state.system.priority = p; if(state.view === 'settings') renderSettings(document.getElementById('content-area')); if(!document.getElementById('action-menu').classList.contains('hidden')) toggleActionMenu(); }
        function setTheme(t) { state.theme = t; document.body.className = `theme-${t}`; renderSettings(document.getElementById('content-area')); }
        function toggleLoad(t) { if (t === 'ac') state.system.loads.ac = state.system.loads.ac > 0 ? 0 : 450; else if (t === 'bulb') state.system.loads.bulbActive = !state.system.loads.bulbActive; if(state.view === 'settings') renderSettings(document.getElementById('content-area')); }
        function toggleDayNight() { state.weather.isDay = !state.weather.isDay; updateWeatherUI(); }

        // --- Initialization ---
        (function init() {
            fetchWeather();
            setInterval(updateSimulation, 3000); 
            setInterval(sendToThingSpeak, 20000); 
            setInterval(fetchWeather, 600000);
            renderDashboard(document.getElementById('content-area'));
        })();

    </script>
</body>
</html>
